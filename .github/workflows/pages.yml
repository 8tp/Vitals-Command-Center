name: Deploy marketing site (GitHub Pages)

# Publishes the static marketing site in site/ to GitHub Pages.
#
# ARMED BUT GUARDED: the deploy job only runs once the repo variable
# PAGES_ENABLED == 'true', so it skips (cleanly, no red X) until release.
#
# To go live at release:
#   1. Make Pages available — make the repo PUBLIC (Free plan), or upgrade to
#      GitHub Pro to keep it private.
#   2. Enable Pages with Source = GitHub Actions:
#        gh api -X POST repos/OWNER/REPO/pages -f build_type=workflow
#      (or Settings → Pages → Build and deployment → Source: GitHub Actions)
#   3. Flip the switch:  gh variable set PAGES_ENABLED --body true
#   Then any push to main touching site/** publishes automatically
#   (or run it now: gh workflow run "Deploy marketing site (GitHub Pages)").

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch: {}

# Least-privilege token: only what Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Skips (no failure) until you set the PAGES_ENABLED repo variable at release.
    if: ${{ vars.PAGES_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
