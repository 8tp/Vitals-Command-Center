<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#12161D" />
    <!-- Type: Plus Jakarta Sans (one friendly geometric family for everything). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap"
    />
    <!-- Theme bootstrap: set data-theme BEFORE paint to avoid a flash of the
         wrong theme. Mirrors stores/themeStore.ts (kept tiny + dependency-free). -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('vcc-theme');
          if (c !== 'light' && c !== 'dark' && c !== 'system') c = 'system';
          var dark =
            c === 'dark' ||
            (c === 'system' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          var t = dark ? 'dark' : 'light';
          var r = document.documentElement;
          r.setAttribute('data-theme', t);
          r.classList.toggle('dark', dark);
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute('content', dark ? '#12161D' : '#F6F7F9');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/favicon-64.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Vitals" />
    <title>Vitals Command Center</title>
    <meta name="description" content="A calm, private health command center — unify your wearables, daily readiness, and an AI brief. Self-hosted, open source." />
    <!-- Open Graph / link previews. Images are relative (each self-hosted
         instance has its own URL). For rich previews in iMessage/Slack, set
         absolute URLs to your own host, e.g. https://your-host/og-image.png -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vitals" />
    <meta property="og:title" content="Vitals — all your wearables, one calm view" />
    <meta property="og:description" content="A calm, private, self-hosted health command center: unify your wearables, a daily readiness read, and an AI brief." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vitals — all your wearables, one calm view" />
    <meta name="twitter:description" content="A calm, private, self-hosted health command center." />
    <meta name="twitter:image" content="/og-image.png" />
  </head>
  <body class="bg-bg-base text-ink antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
