<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FAFBFC"/>
      <stop offset="1" stop-color="#EDF2FB"/>
    </linearGradient>
    <radialGradient id="glow" cx="980" cy="300" r="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#2563EB" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="logo" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3B82F6"/><stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="30" flood-color="#1D4ED8" flood-opacity="0.16"/>
    </filter>
  </defs>

  <!-- full-bleed background (no white band) -->
  <rect width="1200" height="630" fill="url(#base)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- brand lockup -->
  <g transform="translate(80 92)">
    <rect width="92" height="92" rx="26" fill="url(#logo)"/>
    <g transform="translate(46 46) scale(0.0747) translate(-512 -512)" fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 271.6 740.4 A 340 340 0 1 1 752.4 740.4" stroke-opacity="0.22" stroke-width="44"/>
      <path d="M 271.6 740.4 A 340 340 0 1 1 752.4 740.4" stroke-width="44" stroke-dasharray="1057 1700"/>
      <path d="M 352 512 L 452 512 L 486 470 L 514 512 L 540 512 L 566 402 L 596 624 L 622 512 L 672 512" stroke-width="26"/>
    </g>
    <text x="116" y="62" font-family="Plus Jakarta Sans" font-weight="800" font-size="58" fill="#16203A">Vitals</text>
  </g>

  <!-- headline + tagline -->
  <text x="82" y="320" font-family="Plus Jakarta Sans" font-weight="800" font-size="78" fill="#16203A">All your wearables.</text>
  <text x="82" y="406" font-family="Plus Jakarta Sans" font-weight="800" font-size="78" fill="#2563EB">One clear read.</text>
  <text x="84" y="470" font-family="Plus Jakarta Sans" font-weight="500" font-size="30" fill="#5B6776">Daily readiness, sleep, runs &amp; an AI brief.</text>
  <text x="84" y="540" font-family="Plus Jakarta Sans" font-weight="600" font-size="22" letter-spacing="0.4" fill="#0E9C8C">Private  ·  self-hosted  ·  open source</text>

  <!-- readiness ring accent (echoes the dashboard + the canonical mark) -->
  <g transform="translate(960 300)">
    <circle r="148" fill="#ffffff" filter="url(#cardShadow)"/>
    <circle r="118" fill="none" stroke="#E6ECF5" stroke-width="20"/>
    <path d="M 0 -118 A 118 118 0 1 1 -72.9 92.8" fill="none" stroke="url(#ring)" stroke-width="20" stroke-linecap="round"/>
    <text x="0" y="6" text-anchor="middle" font-family="Plus Jakarta Sans" font-weight="800" font-size="72" fill="#16203A">82</text>
    <text x="0" y="44" text-anchor="middle" font-family="Plus Jakarta Sans" font-weight="600" font-size="20" letter-spacing="2" fill="#8794A7">READINESS</text>
  </g>
</svg>
